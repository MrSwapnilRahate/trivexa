<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630">
  <!-- Background gradient -->
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#050816;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0B1020;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="goldGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#E1C564;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#D4AF37;stop-opacity:1" />
    </linearGradient>
  </defs>

  <rect width="1200" height="630" fill="url(#bgGradient)"/>

  <!-- Accent elements -->
  <circle cx="100" cy="80" r="60" fill="#D4AF37" opacity="0.1"/>
  <circle cx="1100" cy="550" r="80" fill="#D4AF37" opacity="0.08"/>

  <!-- Main text -->
  <text x="600" y="220" font-family="Arial, sans-serif" font-size="96" font-weight="bold" fill="#FFFFFF" text-anchor="middle">
    TRIV
  </text>
  <text x="600" y="220" font-family="Arial, sans-serif" font-size="96" font-weight="bold" fill="url(#goldGradient)" text-anchor="middle" dx="350">
    EXA
  </text>

  <!-- Tagline -->
  <text x="600" y="320" font-family="Arial, sans-serif" font-size="48" fill="#B8C0CC" text-anchor="middle">
    Premium Software Development &amp; AI Solutions
  </text>

  <!-- Subtext -->
  <text x="600" y="390" font-family="Arial, sans-serif" font-size="32" fill="#6B7280" text-anchor="middle">
    Enterprise-Grade Digital Experiences
  </text>

  <!-- Rating/credibility -->
  <text x="600" y="500" font-family="Arial, sans-serif" font-size="28" fill="#D4AF37" text-anchor="middle">
    ★ 4.9 Rated • 150+ Projects • 99% Satisfaction
  </text>

  <!-- Decorative line -->
  <line x1="300" y1="550" x2="900" y2="550" stroke="#D4AF37" stroke-width="2" opacity="0.3"/>
</svg>